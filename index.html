<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#020617" />
  <title>FS Escala Operacional</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="application-name" content="FS Escala Operacional" />
  <meta name="apple-mobile-web-app-title" content="FS Escala" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    :root{
      --bg:#020617;
      --card:rgba(15,23,42,.66);
      --line:rgba(255,255,255,.13);
      --text:#f8fafc;
      --muted:#94a3b8;
      --blue:#38bdf8;
      --blue2:#2563eb;
      --cyan:#22d3ee;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#020617;color:var(--text)}
    body{overflow-x:hidden}
    .stage{position:fixed;inset:0;background:#020617;overflow:hidden;z-index:0}
    .stage:before{content:"";position:absolute;inset:-30%;background:
      radial-gradient(circle at 50% 45%,rgba(56,189,248,.22),transparent 18%),
      radial-gradient(circle at 14% 45%,rgba(37,99,235,.22),transparent 24%),
      radial-gradient(circle at 92% 45%,rgba(34,211,238,.16),transparent 26%),
      linear-gradient(90deg,#020617,#071327 50%,#020617);animation:bgMove 9s ease-in-out infinite alternate}
    @keyframes bgMove{from{transform:scale(1) translateX(-1%)}to{transform:scale(1.08) translateX(1%)}}
    .scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.035),rgba(255,255,255,.035) 1px,transparent 1px,transparent 9px);opacity:.08;mix-blend-mode:screen}
    .light{position:absolute;top:0;bottom:0;width:18vw;background:linear-gradient(90deg,transparent,rgba(56,189,248,.22),transparent);filter:blur(18px);animation:sweep 4.8s ease-in-out infinite;opacity:.9}
    @keyframes sweep{0%{left:-26vw}55%,100%{left:108vw}}
    .intro{position:fixed;inset:0;z-index:6;display:grid;place-items:center;background:#020617;animation:introOut .9s ease 2.15s forwards}
    .introLogo{font-size:clamp(72px,13vw,190px);font-weight:1000;letter-spacing:-.1em;line-height:.85;background:linear-gradient(90deg,#fff,#7dd3fc,#2563eb);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 42px rgba(56,189,248,.45);transform:scale(.72);opacity:0;animation:logoImpact 2.1s cubic-bezier(.16,1,.3,1) forwards}
    .introLogo span{letter-spacing:-.05em}
    @keyframes logoImpact{0%{opacity:0;transform:scale(.58);filter:blur(16px)}28%{opacity:1;transform:scale(1.08);filter:blur(0)}62%{transform:scale(1)}100%{opacity:1;transform:scale(12);filter:blur(14px)}}
    @keyframes introOut{to{opacity:0;visibility:hidden}}
    main{position:relative;z-index:2;min-height:100svh;display:flex;align-items:center;justify-content:center;padding:28px}
    .shell{width:min(1060px,100%);min-height:min(720px,calc(100svh - 56px));border-radius:38px;border:1px solid var(--line);background:linear-gradient(145deg,rgba(2,6,23,.78),rgba(15,23,42,.62));box-shadow:0 30px 100px rgba(0,0,0,.52),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(22px);overflow:hidden;position:relative;opacity:0;transform:translateY(18px) scale(.98);animation:contentIn .9s ease 2.55s forwards}
    @keyframes contentIn{to{opacity:1;transform:translateY(0) scale(1)}}
    .shell:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 5%,rgba(56,189,248,.18),transparent 34%),linear-gradient(90deg,rgba(37,99,235,.12),transparent,rgba(34,211,238,.08));pointer-events:none}
    header{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:28px 32px;border-bottom:1px solid rgba(255,255,255,.09)}
    .brand{display:flex;align-items:center;gap:14px}.mark{width:54px;height:54px;border-radius:18px;background:linear-gradient(145deg,#2563eb,#38bdf8);display:grid;place-items:center;box-shadow:0 18px 42px rgba(56,189,248,.25)}.mark svg{width:28px;height:28px}.brand h2{font-size:18px}.brand small{display:block;color:var(--muted);font-weight:700;margin-top:2px}.status{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;background:rgba(34,197,94,.13);border:1px solid rgba(34,197,94,.24);font-weight:900;color:#dcfce7}.status i{width:8px;height:8px;border-radius:99px;background:#22c55e;box-shadow:0 0 16px #22c55e}
    .hero{position:relative;z-index:1;display:grid;place-items:center;text-align:center;padding:68px 42px 80px}.kicker{font-size:12px;font-weight:1000;letter-spacing:.18em;color:#7dd3fc;text-transform:uppercase;margin-bottom:18px}.title{font-size:clamp(42px,7vw,86px);font-weight:1000;letter-spacing:-.07em;line-height:.86;margin-bottom:18px}.title span{display:block;background:linear-gradient(90deg,#fff,#93c5fd,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}.subtitle{font-size:clamp(16px,2vw,21px);color:#cbd5e1;margin-bottom:34px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:18px;width:min(720px,100%)}
    .choice{height:168px;border:1px solid rgba(255,255,255,.13);border-radius:30px;background:linear-gradient(145deg,rgba(15,23,42,.72),rgba(30,41,59,.52));color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;box-shadow:0 18px 60px rgba(0,0,0,.26);transition:.28s ease;position:relative;overflow:hidden}.choice:before{content:"";position:absolute;inset:-80%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.14),transparent);transform:translateX(-45%) rotate(16deg);transition:.55s ease}.choice:hover{transform:translateY(-8px) scale(1.018);border-color:rgba(56,189,248,.48);box-shadow:0 28px 80px rgba(37,99,235,.2)}.choice:hover:before{transform:translateX(45%) rotate(16deg)}.icon{font-size:42px;filter:drop-shadow(0 12px 20px rgba(56,189,248,.24))}.choice b{font-size:25px;letter-spacing:-.04em}.choice small{color:#cbd5e1;font-weight:800}.footerNote{margin-top:24px;color:#64748b;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
    .modalWrap{position:fixed;inset:0;z-index:10;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(2,6,23,.76);backdrop-filter:blur(14px)}.modalWrap.show{display:flex}.modal{width:min(440px,100%);border-radius:32px;padding:30px;border:1px solid rgba(255,255,255,.14);background:linear-gradient(145deg,rgba(15,23,42,.96),rgba(2,6,23,.96));box-shadow:0 34px 100px rgba(0,0,0,.58);text-align:center;animation:modalIn .24s ease both}@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}.modal .micon{font-size:46px;margin-bottom:12px}.modal h3{font-size:30px;letter-spacing:-.06em;margin-bottom:18px}.actions{display:grid;gap:12px}.action{height:56px;border-radius:18px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;text-decoration:none;color:white;font-weight:1000;background:rgba(255,255,255,.07);cursor:pointer}.action.primary{background:linear-gradient(135deg,#2563eb,#06b6d4);box-shadow:0 18px 42px rgba(37,99,235,.25);border:0}.installHint{min-height:18px;margin-top:12px;color:#94a3b8;font-size:12px;font-weight:800;line-height:1.35}.back{margin-top:18px;background:none;border:0;color:#94a3b8;font-weight:900;cursor:pointer;font-size:14px}
    @media(max-width:720px){main{padding:16px}.shell{border-radius:30px;min-height:calc(100svh - 32px)}header{padding:20px}.status{font-size:12px;padding:8px 12px}.mark{width:48px;height:48px;border-radius:16px}.brand h2{font-size:15px}.brand small{font-size:11px}.hero{padding:54px 20px 58px}.title{font-size:46px}.subtitle{font-size:15px;margin-bottom:24px}.choices{grid-template-columns:1fr;gap:14px}.choice{height:132px;border-radius:26px}.icon{font-size:34px}.choice b{font-size:23px}.footerNote{display:none}}
  </style>
</head>
<body>
  <div class="stage"><div class="light"></div><div class="scan"></div></div>
  <div class="intro"><div class="introLogo">F<span>S</span></div></div>
  <main>
    <section class="shell">
      <header>
        <div class="brand"><div class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M7 3h10a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3Z" stroke="white" stroke-width="1.8"/><path d="M8 8h8M8 12h8M8 16h5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div><div><h2>FS Escala Operacional</h2><small>Gestão inteligente de jornada</small></div></div>
        <div class="status"><i></i> Online</div>
      </header>
      <div class="hero">
        
        <h1 class="title">Seja muito bem-vindo</h1>
        
        <div class="choices">
          <button class="choice" onclick="openMode('mobile')"><span class="icon">📱</span><b>Mobile</b></button>
          <button class="choice" onclick="openMode('desktop')"><span class="icon">🖥️</span><b>Desktop</b></button>
        </div>
        <div class="footerNote">FS • Sistema operacional de escala</div>
      </div>
    </section>
  </main>
  <div class="modalWrap" id="modal">
    <div class="modal">
      <div class="micon" id="micon">📱</div>
      <h3 id="mtitle">Mobile</h3>
      <div class="actions">
        <a class="action primary" id="enter" href="FS_Escala_Operacional_Inteligente.html">Entrar</a>
        <button class="action" type="button" onclick="installApp()">Instalar como aplicativo</button>
      </div>
      <div class="installHint" id="installHint"></div>
      <button class="back" onclick="closeMode()">Voltar</button>
    </div>
  </div>
  
  <script>
    const platformFile = 'FS_Escala_Operacional_Inteligente.html';
    let deferredPrompt = null;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
      const hint = document.getElementById('installHint');
      if (hint) hint.textContent = 'Pronto para instalar como aplicativo.';
    });

    function openMode(mode){
      const modal = document.getElementById('modal');
      document.getElementById('micon').textContent = mode === 'desktop' ? '🖥️' : '📱';
      document.getElementById('mtitle').textContent = mode === 'desktop' ? 'Desktop' : 'Mobile';
      document.getElementById('enter').href = platformFile;
      const hint = document.getElementById('installHint');
      if (hint) hint.textContent = '';
      modal.classList.add('show');
    }

    function closeMode(){
      document.getElementById('modal').classList.remove('show');
    }

    async function installApp(){
      const hint = document.getElementById('installHint');

      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (hint) hint.textContent = 'Instalação solicitada.';
        return;
      }

      const ua = navigator.userAgent.toLowerCase();
      const isIOS = /iphone|ipad|ipod/.test(ua);
      const isAndroid = /android/.test(ua);

      if (isIOS) {
        if (hint) hint.textContent = 'No iPhone: toque em Compartilhar e depois em “Adicionar à Tela de Início”.';
      } else if (isAndroid) {
        if (hint) hint.textContent = 'No Android: toque nos três pontos do navegador e escolha “Adicionar à tela inicial” ou “Instalar app”.';
      } else {
        if (hint) hint.textContent = 'No computador: use o ícone de instalar na barra de endereço do Chrome/Edge.';
      }
    }

    document.addEventListener('keydown', e => {
      if(e.key === 'Escape') closeMode();
    });
  </script>

</body>
</html>
