<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#06111f" />
  <title>FS Escala Operacional</title>
  <style>
    :root{
      --bg:#06111f;--panel:rgba(9,18,34,.72);--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#a8b3c7;--blue:#2f7cff;--cyan:#14d9ff;--green:#30e887;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    body{overflow-x:hidden;background:radial-gradient(circle at 20% 12%,rgba(47,124,255,.24),transparent 32%),radial-gradient(circle at 90% 82%,rgba(20,217,255,.18),transparent 34%),linear-gradient(145deg,#030712,#071426 52%,#0b1b33)}
    .stage{position:relative;min-height:100svh;display:grid;place-items:center;padding:26px;overflow:hidden}
    .grid{position:fixed;inset:-40%;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:64px 64px;transform:perspective(700px) rotateX(62deg) translateY(12%);animation:gridMove 16s linear infinite;opacity:.38;pointer-events:none}
    @keyframes gridMove{to{background-position:0 64px,64px 0}}
    .beam{position:fixed;width:42vw;height:42vw;border-radius:999px;filter:blur(34px);opacity:.45;pointer-events:none;animation:orb 10s ease-in-out infinite alternate}.beam.one{left:-12vw;top:8vh;background:#2563eb}.beam.two{right:-15vw;bottom:0;background:#0891b2;animation-delay:-4s}.beam.three{left:44vw;top:-22vw;background:#30e887;opacity:.13;animation-delay:-7s}@keyframes orb{to{transform:translate3d(24px,-18px,0) scale(1.08)}}
    .shell{position:relative;width:min(1080px,100%);border:1px solid var(--line);border-radius:34px;background:linear-gradient(145deg,rgba(15,23,42,.78),rgba(2,8,23,.64));box-shadow:0 34px 110px rgba(0,0,0,.48);backdrop-filter:blur(22px);overflow:hidden;animation:rise .8s cubic-bezier(.2,.9,.2,1) both}
    @keyframes rise{from{opacity:0;transform:translateY(22px) scale(.985)}to{opacity:1;transform:none}}
    .shine{position:absolute;inset:0;background:linear-gradient(115deg,transparent 0%,rgba(255,255,255,.10) 26%,transparent 46%);transform:translateX(-120%);animation:shine 4.6s ease-in-out infinite;pointer-events:none}@keyframes shine{55%,100%{transform:translateX(120%)}}
    header{display:flex;justify-content:space-between;align-items:center;padding:24px 28px;border-bottom:1px solid rgba(255,255,255,.10)}
    .brand{display:flex;align-items:center;gap:14px}.logo{width:58px;height:58px;border-radius:20px;background:linear-gradient(145deg,var(--blue),var(--cyan));display:grid;place-items:center;box-shadow:0 0 35px rgba(20,217,255,.34);animation:logoPulse 3s ease-in-out infinite}.logo svg{width:31px;height:31px}.brand h2{font-size:19px;letter-spacing:-.3px}.brand span{display:block;color:var(--muted);font-size:13px;margin-top:3px}.pill{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(48,232,135,.10);border:1px solid rgba(48,232,135,.26);color:#bbf7d0;font-weight:900;font-size:13px}.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 16px var(--green)}@keyframes logoPulse{50%{transform:translateY(-2px);box-shadow:0 0 48px rgba(20,217,255,.48)}}
    .hero{padding:54px 52px 44px;text-align:center}.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#dbeafe;font-weight:800;font-size:13px;margin-bottom:22px}.hero h1{font-size:clamp(34px,5.4vw,68px);line-height:.98;letter-spacing:-2.4px;max-width:820px;margin:0 auto 18px}.hero h1 b{background:linear-gradient(90deg,#fff,#7dd3fc,#60a5fa);-webkit-background-clip:text;color:transparent}.hero p{max-width:610px;margin:0 auto;color:#cbd5e1;font-size:18px;line-height:1.55}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:38px auto 0;max-width:760px}.choice{position:relative;border:1px solid rgba(255,255,255,.14);background:linear-gradient(145deg,rgba(255,255,255,.095),rgba(255,255,255,.045));border-radius:28px;padding:30px 24px;min-height:205px;cursor:pointer;overflow:hidden;transition:.28s ease;box-shadow:0 18px 42px rgba(0,0,0,.18)}.choice:before{content:"";position:absolute;inset:auto -25% -55% -25%;height:80%;background:radial-gradient(circle,rgba(20,217,255,.26),transparent 62%);opacity:0;transition:.28s}.choice:hover{transform:translateY(-7px) rotateX(2deg);border-color:rgba(125,211,252,.45);box-shadow:0 24px 70px rgba(20,217,255,.14)}.choice:hover:before{opacity:1}.icon{font-size:44px;margin-bottom:16px;filter:drop-shadow(0 8px 20px rgba(20,217,255,.25))}.choice h3{font-size:26px;margin-bottom:8px}.choice p{font-size:14px;color:var(--muted);line-height:1.45}.choice small{display:inline-block;margin-top:18px;color:#e0f2fe;font-weight:900}.footer{padding:0 28px 26px;text-align:center;color:#77849a;font-size:12px}
    dialog{border:none;border-radius:30px;padding:0;background:transparent;color:#fff;width:min(460px,calc(100% - 32px));margin:auto}dialog::backdrop{background:rgba(0,0,0,.62);backdrop-filter:blur(8px)}.modal{border:1px solid var(--line);border-radius:30px;background:linear-gradient(145deg,rgba(15,23,42,.96),rgba(2,8,23,.94));box-shadow:0 30px 90px rgba(0,0,0,.55);padding:26px;text-align:center}.modalIcon{font-size:46px;margin-bottom:10px}.modal h3{font-size:25px;margin-bottom:8px}.modal p{color:#b9c4d8;line-height:1.5;margin-bottom:20px}.actions{display:grid;gap:12px}.primary,.secondary{height:54px;border:0;border-radius:18px;font-size:15px;font-weight:950;cursor:pointer;text-decoration:none;display:grid;place-items:center}.primary{color:white;background:linear-gradient(135deg,#2563eb,#06b6d4);box-shadow:0 15px 35px rgba(37,99,235,.25)}.secondary{color:white;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13)}.close{margin-top:14px;background:transparent;border:0;color:#94a3b8;font-weight:800;cursor:pointer}
    @media(max-width:720px){.stage{padding:14px}.shell{border-radius:28px}header{padding:18px}.logo{width:52px;height:52px;border-radius:18px}.brand h2{font-size:17px}.pill{display:none}.hero{padding:38px 20px 30px}.hero h1{font-size:38px;letter-spacing:-1.6px}.hero p{font-size:15px}.choices{grid-template-columns:1fr;gap:14px;margin-top:28px}.choice{min-height:156px;padding:24px 20px;border-radius:24px}.icon{font-size:38px}.choice h3{font-size:23px}.footer{padding-bottom:20px}}
  </style>
</head>
<body>
  <div class="grid"></div><div class="beam one"></div><div class="beam two"></div><div class="beam three"></div>
  <main class="stage">
    <section class="shell">
      <div class="shine"></div>
      <header>
        <div class="brand">
          <div class="logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M7 3h10a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3Z" stroke="white" stroke-width="1.8"/><path d="M8 8h8M8 12h8M8 16h5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div>
          <div><h2>FS Escala Operacional</h2><span>Gestão inteligente de jornada</span></div>
        </div>
        <div class="pill"><span class="dot"></span> Online</div>
      </header>
      <div class="hero">
        <div class="eyebrow">✨ Entrada premium</div>
        <h1>Bem-vindo ao <b>FS Escala Operacional</b></h1>
        <p>Escolha a experiência que deseja utilizar.</p>
        <div class="choices">
          <button class="choice" onclick="openChoice('mobile')">
            <div class="icon">📱</div><h3>Mobile</h3><p>Interface otimizada para celular, rápida e prática para uso no dia a dia.</p><small>Selecionar mobile →</small>
          </button>
          <button class="choice" onclick="openChoice('desktop')">
            <div class="icon">🖥️</div><h3>Desktop</h3><p>Experiência ampla para computador, ideal para gestão e visualização completa.</p><small>Selecionar desktop →</small>
          </button>
        </div>
      </div>
      <div class="footer">FS • Controle operacional premium</div>
    </section>
  </main>
  <dialog id="modal">
    <div class="modal">
      <div class="modalIcon" id="modalIcon">📱</div>
      <h3 id="modalTitle">Plataforma Mobile</h3>
      <p id="modalText">Escolha como deseja acessar.</p>
      <div class="actions">
        <a class="primary" id="openBtn" href="FS_Escala_Operacional_Inteligente.html">Entrar na plataforma</a>
        <a class="secondary" id="downloadBtn" href="FS_Escala_Operacional_Inteligente.html" download>Baixar para usar no aparelho</a>
      </div>
      <button class="close" onclick="modal.close()">Voltar</button>
    </div>
  </dialog>
  <script>
    const plataforma = 'FS_Escala_Operacional_Inteligente.html';
    const modal = document.getElementById('modal');
    const data = {
      mobile:{icon:'📱',title:'Plataforma Mobile',text:'Versão ideal para celular. Entre agora ou baixe o arquivo para deixar salvo no aparelho.'},
      desktop:{icon:'🖥️',title:'Plataforma Desktop',text:'Versão ideal para computador. Entre agora ou baixe o arquivo para manter uma cópia local.'}
    };
    function openChoice(type){
      const item = data[type];
      modalIcon.textContent = item.icon;
      modalTitle.textContent = item.title;
      modalText.textContent = item.text;
      openBtn.href = plataforma;
      downloadBtn.href = plataforma;
      modal.showModal();
    }
  </script>
</body>
</html>
