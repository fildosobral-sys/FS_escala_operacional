<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b1220" />
  <title>FS Escala Operacional</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:Inter,Arial,Helvetica,sans-serif;background:#08111f;color:#fff;overflow:hidden}
    body{display:flex;align-items:center;justify-content:center;padding:22px;background:
      radial-gradient(circle at 20% 10%,rgba(59,130,246,.28),transparent 34%),
      radial-gradient(circle at 90% 85%,rgba(14,165,233,.20),transparent 30%),
      linear-gradient(145deg,#050914,#0b1220 48%,#0f172a)}
    .bg{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:999px;filter:blur(1px);opacity:.55;animation:float 12s ease-in-out infinite}
    .orb.a{width:160px;height:160px;left:-55px;top:12%;background:rgba(59,130,246,.22)}
    .orb.b{width:220px;height:220px;right:-90px;bottom:10%;background:rgba(34,211,238,.16);animation-delay:-4s}
    .orb.c{width:90px;height:90px;right:18%;top:13%;background:rgba(255,255,255,.08);animation-delay:-7s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-22px) scale(1.04)}}
    .card{position:relative;width:min(430px,100%);padding:28px 22px 24px;border:1px solid rgba(255,255,255,.14);border-radius:30px;background:rgba(15,23,42,.74);box-shadow:0 24px 70px rgba(0,0,0,.42);backdrop-filter:blur(18px);text-align:center;animation:enter .75s ease both}
    @keyframes enter{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .logo{width:74px;height:74px;margin:0 auto 16px;border-radius:24px;background:linear-gradient(145deg,#1d4ed8,#38bdf8);display:grid;place-items:center;box-shadow:0 16px 34px rgba(56,189,248,.26);animation:pulse 2.6s ease-in-out infinite}
    .logo svg{width:38px;height:38px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.28))}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
    .tag{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;margin-bottom:14px;border-radius:999px;background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.22);color:#bbf7d0;font-size:12px;font-weight:800;letter-spacing:.2px}
    .dot{width:7px;height:7px;border-radius:999px;background:#22c55e;box-shadow:0 0 14px #22c55e}
    h1{font-size:24px;line-height:1.08;margin-bottom:10px;letter-spacing:-.6px}
    p{font-size:14px;line-height:1.55;color:#cbd5e1;margin:0 auto 20px;max-width:330px}
    .loader{height:8px;width:100%;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden;margin:16px 0 15px}
    .bar{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#2563eb,#38bdf8,#22c55e);animation:load 2.8s ease forwards}
    @keyframes load{to{width:100%}}
    .btn{display:flex;align-items:center;justify-content:center;width:100%;height:50px;border-radius:18px;text-decoration:none;color:white;font-weight:900;font-size:15px;background:linear-gradient(135deg,#2563eb,#0284c7);box-shadow:0 14px 28px rgba(37,99,235,.25);transition:.2s ease}
    .btn:active{transform:scale(.985)}
    .mini{margin-top:14px;font-size:11px;color:#94a3b8}
    @media(max-width:390px){.card{padding:24px 18px;border-radius:26px}.logo{width:66px;height:66px}h1{font-size:22px}p{font-size:13px}.btn{height:48px}}
  </style>
</head>
<body>
  <div class="bg"><span class="orb a"></span><span class="orb b"></span><span class="orb c"></span></div>

  <main class="card">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 3h10a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3Z" stroke="white" stroke-width="1.8"/>
        <path d="M8 8h8M8 12h8M8 16h5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="tag"><span class="dot"></span> Sistema operacional online</div>
    <h1>Bem-vindo ao FS Escala Operacional</h1>
    <p>Carregando sua plataforma de escala, gestão de equipe e controle de jornada com segurança e organização.</p>

    <div class="loader"><div class="bar"></div></div>

    <a class="btn" id="entrar" href="FS_Escala_Operacional_Inteligente.html">Entrar na plataforma</a>
    <div class="mini">Redirecionamento automático em instantes...</div>
  </main>

  <script>
    const plataforma = 'FS_Escala_Operacional_Inteligente.html';
    setTimeout(() => { window.location.href = plataforma; }, 3000);
  </script>
</body>
</html>
